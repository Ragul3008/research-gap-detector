# ─────────────────────────────────────────────
# docker-compose.yml
# AI Research Novelty & Gap Detector
# Runs both API and Streamlit frontend
# ─────────────────────────────────────────────

version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research_gap_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    environment:
      - EMBEDDING_MODEL=BAAI/bge-large-en-v1.5
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
      # Set your Anthropic API key here for LLM explanations (optional)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./data:/app/data      # persist index and processed data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research_gap_frontend
    command: streamlit run frontend/app.py --server.port 8501 --server.address 0.0.0.0 --server.enableCORS false --server.enableXsrfProtection false
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  research_data:
    driver: local
